<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to Switzerland Trip</title>
  <style>
    :root {
      --bg1: #fff0f5;
      --bg2: #ffe4ec;
      --text: #7a1f42;
      --card: rgba(255, 255, 255, 0.72);
      --border: rgba(255, 255, 255, 0.55);
      --shadow: 0 20px 50px rgba(122, 31, 66, 0.18);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, #fff8fb 0%, transparent 35%),
        radial-gradient(circle at bottom right, #ffdbe8 0%, transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      position: relative;
    }

    #hearts {
      position: fixed;
      inset: 0;
      overflow: hidden;
      z-index: 0;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      background-image: url('heart.png');
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      opacity: 0.18;
      animation: floatAround linear infinite;
      will-change: transform;
      filter: drop-shadow(0 4px 8px rgba(122, 31, 66, 0.12));
    }

    @keyframes floatAround {
      0% {
        transform: translateY(0px) translateX(0px) rotate(0deg);
      }
      25% {
        transform: translateY(-18px) translateX(10px) rotate(6deg);
      }
      50% {
        transform: translateY(10px) translateX(-8px) rotate(-6deg);
      }
      75% {
        transform: translateY(-8px) translateX(14px) rotate(4deg);
      }
      100% {
        transform: translateY(0px) translateX(0px) rotate(0deg);
      }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: min(980px, 100%);
      padding: 38px 30px;
      border-radius: 28px;
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      text-align: center;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 3.5rem);
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .subtitle {
      font-size: clamp(0.95rem, 2vw, 1.1rem);
      opacity: 0.82;
      margin-bottom: 30px;
    }

    .countdown {
      display: grid;
      grid-template-columns: repeat(4, minmax(90px, 1fr));
      gap: 16px;
      margin: 0 auto 22px;
      max-width: 860px;
    }

    .time-box {
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.7);
      border-radius: 22px;
      padding: 22px 12px;
      box-shadow: 0 10px 24px rgba(122, 31, 66, 0.08);
    }

    .number {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      line-height: 1;
      margin-bottom: 10px;
    }

    .label {
      font-size: clamp(0.85rem, 2vw, 1rem);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      opacity: 0.8;
    }

    .target {
      margin-top: 12px;
      font-size: clamp(0.95rem, 2vw, 1.05rem);
      opacity: 0.85;
    }

    .done {
      font-size: clamp(1.3rem, 3vw, 2rem);
      font-weight: 700;
      margin-top: 12px;
    }

    @media (max-width: 640px) {
      body {
        overflow: auto;
      }

      .wrapper {
        padding: 16px;
      }

      .card {
        padding: 28px 18px;
      }

      .countdown {
        grid-template-columns: repeat(2, minmax(110px, 1fr));
      }
    }
  </style>
</head>
<body>
  <div id="hearts"></div>

  <main class="wrapper">
    <section class="card">
      <h1>COUNTDOWN TO SWITZERLAND TRIP</h1>
      <p class="subtitle">Counting down to 20 April 2026, 10:35 in Belgium</p>

      <div class="countdown" id="countdown">
        <div class="time-box">
          <div class="number" id="days">0</div>
          <div class="label">Days</div>
        </div>
        <div class="time-box">
          <div class="number" id="hours">0</div>
          <div class="label">Hours</div>
        </div>
        <div class="time-box">
          <div class="number" id="minutes">0</div>
          <div class="label">Minutes</div>
        </div>
        <div class="time-box">
          <div class="number" id="seconds">0</div>
          <div class="label">Seconds</div>
        </div>
      </div>

      <p class="target" id="targetText">Target time: 20 April 2026, 10:35 Belgium time</p>
      <p class="done" id="doneMessage" style="display: none;">It’s time for the Switzerland trip ❤️</p>
    </section>
  </main>

  <script>
    // Belgium is in Central European Summer Time on 20 April 2026, so UTC+2.
    // This timestamp represents 20 April 2026 at 10:35:00 in Belgium.
    const targetDate = new Date('2026-04-20T10:35:00+02:00');

    const daysEl = document.getElementById('days');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const countdownEl = document.getElementById('countdown');
    const doneMessageEl = document.getElementById('doneMessage');

    function updateCountdown() {
      const now = new Date();
      const difference = targetDate - now;

      if (difference <= 0) {
        daysEl.textContent = '0';
        hoursEl.textContent = '0';
        minutesEl.textContent = '0';
        secondsEl.textContent = '0';
        countdownEl.style.opacity = '0.55';
        doneMessageEl.style.display = 'block';
        return;
      }

      const totalSeconds = Math.floor(difference / 1000);
      const days = Math.floor(totalSeconds / (60 * 60 * 24));
      const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
      const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = days;
      hoursEl.textContent = String(hours).padStart(2, '0');
      minutesEl.textContent = String(minutes).padStart(2, '0');
      secondsEl.textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    function createHearts() {
      const container = document.getElementById('hearts');
      const numberOfHearts = window.innerWidth < 640 ? 20 : 34;

      container.innerHTML = '';

      for (let i = 0; i < numberOfHearts; i++) {
        const heart = document.createElement('div');
        heart.className = 'heart';

        const size = Math.random() * 70 + 28;
        heart.style.width = `${size}px`;
        heart.style.height = `${size}px`;
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.top = `${Math.random() * 100}%`;
        heart.style.animationDuration = `${Math.random() * 10 + 8}s`;
        heart.style.animationDelay = `${Math.random() * 4}s`;
        heart.style.opacity = `${Math.random() * 0.16 + 0.08}`;
        heart.style.transform = `rotate(${Math.random() * 30 - 15}deg)`;

        container.appendChild(heart);
      }
    }

    createHearts();
    window.addEventListener('resize', createHearts);
  </script>
</body>
</html>
